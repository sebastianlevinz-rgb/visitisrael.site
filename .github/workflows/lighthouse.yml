name: Lighthouse

# Builds the Astro static site, serves it with `astro preview`, and runs
# Lighthouse against a few representative pages on every push to master and on
# pull requests. Reports upload to temporary public storage (link in the logs).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start preview server
        run: pnpm preview &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:4321 --timeout 60000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4321/
            http://localhost:4321/jerusalem
            http://localhost:4321/jerusalem/temple-mount
            http://localhost:4321/tel-aviv
            http://localhost:4321/first-time-in-israel
          uploadArtifacts: true
          temporaryPublicStorage: true
