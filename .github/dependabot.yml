version: 2
updates:
  # npm — the Astro stack (post-rebuild). Next.js / React / Vitest / ESLint
  # were removed when the site was rebuilt as an Astro SSG, so those groups
  # are gone.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore
      include: scope
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      fonts:
        patterns:
          - '@fontsource/*'
          - '@fontsource-variable/*'
      dev-tooling:
        patterns:
          - 'prettier'
          - 'prettier-*'
          - 'typescript'
          - '@playwright/test'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - automated
      - github-actions
    commit-message:
      prefix: chore
      include: scope
